input {
  # Application logs from file
  file {
    path => "/var/log/app/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "app"
    tags => ["multisig-wallet"]
  }

  # TCP input for direct log shipping
  tcp {
    port => 5000
    codec => json
    type => "api"
    tags => ["multisig-wallet", "api"]
  }

  # Docker container logs
  docker {
    source => "stdout"
    tags => ["docker"]
  }
}

filter {
  # Parse JSON logs
  if [type] == "app" or [type] == "api" {
    json {
      source => "message"
      target => "parsed"
    }
    
    # Extract fields from parsed JSON
    mutate {
      add_field => {
        "level" => "%{[parsed][level]}"
        "message_content" => "%{[parsed][message]}"
        "service" => "%{[parsed][service]}"
        "timestamp_log" => "%{[parsed][timestamp]}"
      }
    }
    
    # Parse timestamps
    date {
      match => [ "timestamp_log", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSS" ]
      target => "@timestamp"
    }
  }

  # Add metadata
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:-production}"
      "application" => "stellar-multisig-safe"
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => ["@version", "host", "parsed"]
  }

  # GeoIP for request logs (if available)
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "multisig-logs-%{+YYYY.MM.dd}"
    template_name => "multisig-logs"
    template_overwrite => true
  }

  # Debug output (optional)
  # stdout { codec => rubydebug }
}
